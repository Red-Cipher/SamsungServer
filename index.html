<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background-color: #0a0a0f;
        color: #00f0ff;
        font-family: 'Share Tech Mono', monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        border: 1px solid #00f0ff;
        box-shadow: 0 0 20px #00f0ff44, inset 0 0 20px #00f0ff11;
        padding: 60px;
        width: 700px;
    }

    h1 {
        color: #ff2d78;
        text-shadow: 0 0 10px #ff2d78;
        letter-spacing: 4px;
        margin-bottom: 30px;
    }

    h2 {
        color: #ff2d78;
        text-shadow: 0 0 6px #ff2d78;
        letter-spacing: 3px;
        margin-bottom: 20px;
    }

    div {
        padding: 18px 0;
        border-bottom: 1px solid #00f0ff22;
        font-size: 1.1em;
        letter-spacing: 2px;
    }

    p {
        display: inline;
        color: #00f0ff;
        text-shadow: 0 0 6px #00f0ff;
    }
</style>

</head>
<body>
    <div class="container">
	<h1>RedCipher's Network Node</h1>
        
	<h2>Status:</h2>
	
	<div>Server IP: <p id="IP"></p></div>
        
	<div>Time Since Reboot: <p id="Uptime"></p></div>
        
	<div>Port Number: <p id="Port_Number"></p></div>

        <div>Current User:<p id="Operator"></p></div>
        
	<div>Operating System: <p id="Operating_System"></p></div>
    </div>

    <script>
        async function fetchJSONData() {
            try {
                const response = await fetch('info.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const jsonData = await response.json();
                console.log(jsonData);
                let IP = jsonData['IP'];
                let OS = jsonData['Operating System'];
                let Operator = jsonData['Operator'];
                let PortNumber = jsonData['Port Number'];
                let Up_Time = jsonData['Uptime'];
                console.log(Up_Time);

                let IpElement = document.getElementById("IP");
                let UptimeElement = document.getElementById("Uptime");
                let PortNumberElement = document.getElementById("Port_Number");
                let OperatorElement = document.getElementById("Operator");
                let OSElement = document.getElementById("Operating_System");
                console.log(UptimeElement);

                IpElement.innerHTML = IP;
                UptimeElement.innerHTML = Up_Time;
                PortNumberElement.innerHTML = PortNumber;
                OperatorElement.innerHTML = Operator;
                OSElement.innerHTML = OS;

            } catch (error) {
                console.error('Error fetching JSON', error);
            }
        }

        fetchJSONData();

        //console.log(data.IP);
        //console.log(data.Uptime);
        //console.log(data['Port Number']);
        //console.log(data.Operator);
        // console.log(data['Operating System']);
    </script>
</body>
</html>
